name: Feature request
description: Suggest an improvement for AI Private Workspace
title: "Feature: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or user need
      description: What should be easier, safer, or clearer?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired behavior.
  - type: checkboxes
    id: safety
    attributes:
      label: Safety impact
      options:
        - label: This does not require frontend shell execution.
        - label: This keeps risky actions explicit and user-approved.
