name: Feature request
description: Suggest an improvement for AI Private Workspace
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the desired behavior.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety expectations
      options:
        - label: This should not require frontend shell execution.
        - label: This should keep risky actions explicit and user-approved.
        - label: This should avoid committing runtime/build data.
