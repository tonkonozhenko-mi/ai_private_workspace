# CodeQL — GitHub's free static analysis (SAST). Scans the Python backend and
# the TypeScript/JavaScript frontend for security issues and reports them in the
# Security › Code scanning tab. Also satisfies the OpenSSF static-analysis
# criterion and the Scorecard "SAST" check.
name: CodeQL

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: '30 7 * * 1' # weekly, Monday 07:30 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      # Required to write analysis results to the code-scanning dashboard.
      security-events: write
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # No compilation step needed for interpreted languages.
          - language: python
            build-mode: none
          - language: javascript-typescript
            build-mode: none
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v3
        with:
          category: "/language:${{ matrix.language }}"
