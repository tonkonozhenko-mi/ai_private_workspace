# Automated dependency updates.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # Frontend (npm) — Vite/React/Tauri CLI toolchain.
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      frontend-dev:
        dependency-type: "development"
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # The app targets React 18, so keep the React runtime and its type
      # packages on the matching major. A v19 bump of @types/react breaks the
      # @types/react-dom@18 peer requirement (npm ci ERESOLVE). Revisit these
      # when migrating the app to React 19.
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react-dom"
        update-types: ["version-update:semver-major"]

  # Backend (pip) — FastAPI/runtime dependencies.
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"

  # Rust crates used by the Tauri desktop shell.
  - package-ecosystem: "cargo"
    directory: "/frontend/src-tauri"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions used by the CI/release workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(ci)"

  # Backend container base image — keeps the pinned digest fresh.
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps)"
