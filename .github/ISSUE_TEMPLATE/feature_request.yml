name: Feature request
description: Suggest an improvement
title: "[Feature] "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: flow
    attributes:
      label: Proposed user flow
      description: Describe the desired flow in simple steps.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety considerations
      options:
        - label: This does not add frontend shell execution.
        - label: This does not start scan/index/rebuild/restart/model download/MCP/Agent actions automatically.
        - label: Risky operations remain explicit and backend-side.
  - type: textarea
    id: notes
    attributes:
      label: Notes
