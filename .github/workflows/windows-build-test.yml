name: Windows build test (manual, temporary)

# TEMPORARY helper for bringing up Windows support. Unlike the real Release
# workflow, this:
#   • runs ONLY on Windows (no macOS builds),
#   • is triggered by hand from the Actions tab (no git tag needed),
#   • does NOT publish a GitHub Release — it uploads the .exe installer as a
#     downloadable build artifact instead.
# Delete this file once the Windows job in release.yml builds cleanly.

on:
  workflow_dispatch: # adds a "Run workflow" button in the Actions tab
    inputs:
      llama_cpp_version:
        description: "llama.cpp release tag to bundle"
        required: false
        default: "b9675"

permissions:
  contents: read

jobs:
  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # --- Backend: build the frozen Python runtime the app bundles ---
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build frozen backend runtime
        shell: bash
        env:
          AI_PRIVATE_WORKSPACE_PACKAGING_PYTHON: python
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.lock
          bash scripts/build_pyinstaller_backend_runtime.sh

      # --- llama.cpp: stage the bundled llama-server.exe (CPU x64) ---
      - name: Stage llama-server binary
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLAMA_CPP_VERSION: ${{ github.event.inputs.llama_cpp_version }}
        run: bash scripts/fetch_llama_server.sh x64

      # --- Frontend toolchain ---
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      # --- Rust toolchain (host target = x64 MSVC) ---
      - uses: dtolnay/rust-toolchain@stable

      # --- Build the NSIS installer (no release publish) ---
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Present for the updater artifact; harmless if the build does not sign.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: frontend
          # No tagName/releaseName => tauri-action just builds, never publishes.
          args: "--bundles nsis"

      # --- Hand the installer back as a downloadable artifact ---
      - name: Upload Windows installer
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            frontend/src-tauri/target/release/bundle/nsis/*.exe
            frontend/src-tauri/target/release/bundle/nsis/*.exe.sig
          if-no-files-found: warn
