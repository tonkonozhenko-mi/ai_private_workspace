<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">AI Private Workspace product flow</title>
  <desc id="desc">A local-first flow from workspace selection to scan, context build, ask, reports, model manager, and safe agent planning.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fafc"/>
      <stop offset="1" stop-color="#e7eef5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#173142" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1200" height="420" rx="36" fill="url(#bg)"/>
  <text x="64" y="72" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="30" font-weight="700" fill="#26343d">AI Private Workspace</text>
  <text x="64" y="104" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17" fill="#63727d">Local-first project onboarding, context, answers, reports, and safe agent planning.</text>
  <g transform="translate(64 155)" filter="url(#shadow)">
    <g>
      <rect width="150" height="110" rx="24" fill="#ffffff" stroke="#d9e3ea"/>
      <text x="24" y="42" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#2d3c45">1. Workspace</text>
      <text x="24" y="72" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" fill="#6d7c86">Choose local</text>
      <text x="24" y="91" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" fill="#6d7c86">project folder</text>
    </g>
    <g transform="translate(175 0)">
      <rect width="150" height="110" rx="24" fill="#ffffff" stroke="#d9e3ea"/>
      <text x="24" y="42" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#2d3c45">2. Scan</text>
      <text x="24" y="72" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" fill="#6d7c86">Detect skills</text>
      <text x="24" y="91" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" fill="#6d7c86">and files</text>
    </g>
    <g transform="translate(350 0)">
      <rect width="150" height="110" rx="24" fill="#ffffff" stroke="#d9e3ea"/>
      <text x="24" y="42" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#2d3c45">3. Context</text>
      <text x="24" y="72" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" fill="#6d7c86">Build local</text>
      <text x="24" y="91" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" fill="#6d7c86">search index</text>
    </g>
    <g transform="translate(525 0)">
      <rect width="150" height="110" rx="24" fill="#ffffff" stroke="#d9e3ea"/>
      <text x="24" y="42" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#2d3c45">4. Ask</text>
      <text x="24" y="72" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" fill="#6d7c86">Answer with</text>
      <text x="24" y="91" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" fill="#6d7c86">local sources</text>
    </g>
    <g transform="translate(700 0)">
      <rect width="150" height="110" rx="24" fill="#ffffff" stroke="#d9e3ea"/>
      <text x="24" y="42" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#2d3c45">5. Reports</text>
      <text x="24" y="72" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" fill="#6d7c86">Generate local</text>
      <text x="24" y="91" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" fill="#6d7c86">documentation</text>
    </g>
    <g transform="translate(875 0)">
      <rect width="190" height="110" rx="24" fill="#ffffff" stroke="#d9e3ea"/>
      <text x="24" y="42" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#2d3c45">6. Safe Agent</text>
      <text x="24" y="72" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" fill="#6d7c86">Plan first, approve</text>
      <text x="24" y="91" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" fill="#6d7c86">tools later</text>
    </g>
  </g>
  <text x="64" y="340" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" fill="#63727d">No hidden uploads. No frontend shell execution. Model downloads and future tools stay explicit and approval-gated.</text>
</svg>
