name: CI

on:
  pull_request:
  push:
    branches: [main]

# Least-privilege by default; jobs only read the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.lock
      - name: Install backend dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.lock
      - name: Run backend tests
        run: |
          cd backend
          pytest -q

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci
      - name: Build frontend
        run: |
          cd frontend
          npm run typecheck
          npm run build

  lint:
    name: Backend lint (advisory)
    runs-on: ubuntu-latest
    # Advisory while the lint baseline is being cleaned up: surfaces issues on
    # PRs without blocking merges. Set this to false to make lint required.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install ruff
        run: python -m pip install ruff
      - name: Ruff lint
        run: ruff check backend
      - name: Ruff format check
        run: ruff format --check backend

  release-audit:
    name: Release candidate audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run release audit
        run: ./scripts/audit_release_candidate.sh
