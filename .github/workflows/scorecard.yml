# OpenSSF Scorecard — automated supply-chain security analysis.
# Scores the repo's security practices (branch protection, pinned dependencies,
# token permissions, dangerous workflows, etc.) and publishes the results so the
# Scorecard README badge stays live. Read-only; opens no PRs.
name: Scorecard supply-chain security

on:
  # Re-run when branch protection rules change (a scored signal).
  branch_protection_rule:
  schedule:
    - cron: '20 7 * * 1' # weekly, Monday 07:20 UTC
  push:
    branches: ["main"]

# Top-level least privilege; the job widens only what it needs.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload the results to the code-scanning dashboard.
      security-events: write
      # Needed to publish results to the public OpenSSF API (badge data).
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish to the public OpenSSF dashboard so the README badge works.
          publish_results: true

      # Keep a copy of the SARIF as a build artifact for debugging.
      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      # Surface findings in the repository's Security › Code scanning tab.
      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v3
        with:
          sarif_file: results.sarif
