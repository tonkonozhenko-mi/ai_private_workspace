name: CI

on:
  pull_request:
  push:
    branches: [main]

# Least-privilege by default; jobs only read the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.lock
      - name: Install backend dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.lock
      - name: Run backend tests
        run: |
          cd backend
          pytest -q --junitxml=test-results.xml
      - name: Publish test summary
        if: always()
        run: python scripts/ci_test_summary.py backend/test-results.xml >> "$GITHUB_STEP_SUMMARY"
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-test-results
          path: backend/test-results.xml
          if-no-files-found: ignore

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci
      - name: Build frontend
        run: |
          cd frontend
          npm run typecheck
          npm run build

  lint:
    name: Backend lint (advisory)
    runs-on: ubuntu-latest
    # Advisory while the lint baseline is being cleaned up: surfaces issues on
    # PRs without blocking merges. Set this to false to make lint required.
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
      - name: Install ruff
        run: python -m pip install ruff
      - name: Ruff lint
        run: ruff check backend
      - name: Ruff format check
        run: ruff format --check backend

  release-audit:
    name: Release candidate audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - name: Run release audit
        run: ./scripts/audit_release_candidate.sh
