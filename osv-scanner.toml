# OSV-Scanner triage. Each ignored advisory is one we cannot fix ourselves, with
# the reason recorded. `ignoreUntil` forces a re-review so nothing is forgotten.
#
# The GTK/glib crates are Linux-only (GTK3 + webkit2gtk) transitive dependencies
# of Tauri. This project ships ONLY macOS and Windows binaries, which use
# WKWebView / WebView2 — none of this code is built into a shipped artifact, and
# there is no upstream fix without Tauri changing its Linux webview stack.

[[IgnoredVulns]]
id = "RUSTSEC-2024-0413" # atk
ignoreUntil = 2027-01-01
reason = "Linux-only (GTK3) transitive dep of Tauri; not in the shipped macOS/Windows binaries; no upstream fix."

