# REUSE compliance — verifies every file has machine-readable copyright and
# licensing information (https://reuse.software). Keeps the "REUSE compliant"
# badge honest. Runs the linter via pip so no extra third-party action is needed.
name: REUSE compliance

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: reuse-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  reuse:
    name: REUSE lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'
      - name: Install REUSE tool
        run: python -m pip install reuse
      - name: Check REUSE compliance
        run: reuse lint
