name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run focused backend checks
        working-directory: backend
        run: pytest -q tests/test_health.py tests/test_api_inventory.py tests/test_release_candidate_audit.py tests/test_release_candidate_audit_script.py

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  release-audit:
    name: Release audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run source release audit
        run: ./scripts/audit_release_candidate.sh
