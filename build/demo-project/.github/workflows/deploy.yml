name: Deploy
on:
  push:
    branches: [main]
jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: terraform plan -input=false
  apply:
    needs: plan
    environment: production
    runs-on: ubuntu-latest
    steps:
      - run: terraform apply -auto-approve tfplan
