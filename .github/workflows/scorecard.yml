# OpenSSF Scorecard — automated supply-chain security analysis.
# Scores the repo's security practices (branch protection, pinned dependencies,
# token permissions, dangerous workflows, etc.) and publishes the results so the
# Scorecard README badge stays live. Read-only; opens no PRs.
name: Scorecard supply-chain security

on:
  # Re-run when branch protection rules change (a scored signal).
  branch_protection_rule:
  schedule:
    - cron: '20 7 * * 1' # weekly, Monday 07:20 UTC
  push:
    branches: ["main"]

# Top-level least privilege; the job widens only what it needs.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload the results to the code-scanning dashboard.
      security-events: write
      # Needed to publish results to the public OpenSSF API (badge data).
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish to the public OpenSSF dashboard so the README badge works.
          publish_results: true

      # Keep a copy of the SARIF as a build artifact for debugging.
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      # Surface findings in the repository's Security › Code scanning tab.
      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v3
        with:
          sarif_file: results.sarif
