[pytest]
# build/demo-project is a *fixture*: a small imaginary repository the app is
# pointed at, with its own tests that exist to be found by the scanner, not to be
# run by ours. Collecting them from the repo root would fail on imports that only
# make sense inside that demo.
norecursedirs = build dist node_modules .git
filterwarnings =
    ignore:Using `httpx` with `starlette\.testclient` is deprecated; install `httpx2` instead\.:Warning
