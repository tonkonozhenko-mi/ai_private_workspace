# Tooling configuration for the backend package.
# Ruff is the linter/formatter; see https://docs.astral.sh/ruff/
[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = [
    ".venv",
    ".venv-x86_64",
    "build",
    "dist",
]

[tool.ruff.lint]
# Correctness-focused set only:
#   F  pyflakes (undefined names, unused imports/variables, bad f-strings)
#   I  isort    (import ordering)
# Both are essentially fully auto-fixable, so `ruff check --fix` keeps the tree
# clean. Pure-layout pycodestyle rules (E/W) are intentionally not selected:
# `ruff format` already enforces layout, and the remaining E/W findings were
# non-auto-fixable style nits (import-not-at-top, bare except, etc.) that added
# noise without catching bugs. Re-enable E/W/UP/B/C4/SIM later if desired.
select = ["F", "I"]

[tool.ruff.format]
quote-style = "double"
