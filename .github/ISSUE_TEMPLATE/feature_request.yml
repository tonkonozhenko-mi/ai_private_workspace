name: Feature request
description: Suggest a product improvement
title: "Feature: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Backend
        - Frontend
        - RAG / indexing
        - Model management
        - Desktop packaging
        - Agent / MCP
        - Documentation
        - Other
  - type: checkboxes
    id: safety
    attributes:
      label: Safety checklist
      options:
        - label: The feature keeps scans, indexing, model downloads, MCP, and Agent execution explicit/user-approved.
