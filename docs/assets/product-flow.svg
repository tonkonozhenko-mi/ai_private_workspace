<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">AI Private Workspace product flow</title>
  <desc id="desc">Local project files are scanned, indexed locally, used by a local AI model, and reviewed through safe Agent and MCP planning gates.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e8eef3"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f6f8fb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#1f2937" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="360" rx="36" fill="url(#bg)"/>
  <text x="60" y="58" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="28" font-weight="700" fill="#24323d">AI Private Workspace</text>
  <text x="60" y="88" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15" fill="#667683">Local-first project understanding with explicit user control</text>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <g transform="translate(60 135)" filter="url(#shadow)">
      <rect width="185" height="130" rx="24" fill="url(#card)" stroke="#d8e2ea"/>
      <text x="24" y="42" font-size="14" font-weight="700" fill="#7b8994" letter-spacing="2">STEP 1</text>
      <text x="24" y="76" font-size="22" font-weight="700" fill="#24323d">Workspace</text>
      <text x="24" y="102" font-size="14" fill="#667683">Select local project</text>
    </g>
    <path d="M260 200h55" stroke="#9fb0bd" stroke-width="3" stroke-linecap="round"/>
    <path d="M310 190l12 10-12 10" fill="none" stroke="#9fb0bd" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(330 135)" filter="url(#shadow)">
      <rect width="185" height="130" rx="24" fill="url(#card)" stroke="#d8e2ea"/>
      <text x="24" y="42" font-size="14" font-weight="700" fill="#7b8994" letter-spacing="2">STEP 2</text>
      <text x="24" y="76" font-size="22" font-weight="700" fill="#24323d">Local context</text>
      <text x="24" y="102" font-size="14" fill="#667683">Scan and index safely</text>
    </g>
    <path d="M530 200h55" stroke="#9fb0bd" stroke-width="3" stroke-linecap="round"/>
    <path d="M580 190l12 10-12 10" fill="none" stroke="#9fb0bd" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(600 135)" filter="url(#shadow)">
      <rect width="185" height="130" rx="24" fill="url(#card)" stroke="#d8e2ea"/>
      <text x="24" y="42" font-size="14" font-weight="700" fill="#7b8994" letter-spacing="2">STEP 3</text>
      <text x="24" y="76" font-size="22" font-weight="700" fill="#24323d">Local models</text>
      <text x="24" y="102" font-size="14" fill="#667683">Ollama with approval</text>
    </g>
    <path d="M800 200h55" stroke="#9fb0bd" stroke-width="3" stroke-linecap="round"/>
    <path d="M850 190l12 10-12 10" fill="none" stroke="#9fb0bd" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(870 135)" filter="url(#shadow)">
      <rect width="185" height="130" rx="24" fill="url(#card)" stroke="#d8e2ea"/>
      <text x="24" y="42" font-size="14" font-weight="700" fill="#7b8994" letter-spacing="2">STEP 4</text>
      <text x="24" y="76" font-size="22" font-weight="700" fill="#24323d">Ask & report</text>
      <text x="24" y="102" font-size="14" fill="#667683">Answers use local sources</text>
    </g>
  </g>
  <rect x="60" y="300" width="1080" height="1" fill="#d8e2ea"/>
  <text x="60" y="330" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" fill="#667683">Agent and MCP are safe planning foundations: tools are reviewed, approved, and reserved for future sandboxed execution.</text>
</svg>
