name: Release (build, sign updater, publish)

# Builds the desktop app for macOS and Windows on every version tag, signs the
# Tauri updater artifacts, and publishes the installers + a `latest.json` update
# manifest to a GitHub Release. Installed apps poll that manifest and update
# themselves. See docs/RELEASE_AND_UPDATES.md for the full setup and the secrets
# this workflow needs.
#
# This is a starting template — CI workflows always need a couple of real runs to
# get exactly right for your machine matrix. Adjust paths/steps as needed.

on:
  push:
    tags:
      - "v*" # e.g. v0.2.0

permissions:
  contents: write # needed to create the GitHub Release

# One release run per tag; never cancel a publish midway.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon (M1/M2/M3)
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest # Intel Macs
            args: "--target x86_64-apple-darwin"
          - platform: windows-latest # Windows x64 (NSIS installer)
            # tauri.conf targets are macOS bundles (app/dmg); --bundles overrides
            # that on Windows to build the NSIS installer (+ its updater artifact).
            args: "--bundles nsis"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          # Full history so we can diff against the previous tag for release notes.
          fetch-depth: 0

      # --- Release notes: the CHANGELOG section for this tag + an auto commit list.
      #     Runs on every matrix entry but produces identical text; tauri-action
      #     creates the release once and reuses it for the other architecture. ---
      - name: Build release notes
        id: notes
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          # Pull the "## [VERSION]" section out of CHANGELOG.md (up to the next "## [").
          SECTION=$(awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" {flag=1; next}
            flag && /^## \[/ {exit}
            flag {print}
          ' CHANGELOG.md)
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log --no-merges --pretty='- %s' "${PREV_TAG}..${TAG}")
            RANGE_LINK="https://github.com/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...${TAG}"
          else
            COMMITS=$(git log --no-merges --pretty='- %s' "${TAG}")
            RANGE_LINK="https://github.com/${GITHUB_REPOSITORY}/commits/${TAG}"
          fi
          {
            echo "body<<NOTES_EOF"
            [ -n "$SECTION" ] && printf '%s\n\n' "$SECTION"
            echo "<details><summary>All commits in this release</summary>"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "</details>"
            echo ""
            echo "**Full changelog:** $RANGE_LINK"
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      # --- Backend: build the frozen Python runtime the app bundles ---
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - name: Build frozen backend runtime
        shell: bash
        env:
          # Tell the build script exactly which Python to use (the one we just
          # installed PyInstaller into), avoiding per-OS venv path differences.
          AI_PRIVATE_WORKSPACE_PACKAGING_PYTHON: python
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.lock
          # Produces build/desktop/frozen-backend-runtime (referenced by tauri.conf resources).
          bash scripts/build_pyinstaller_backend_runtime.sh

      # --- llama.cpp: stage the bundled llama-server binary for this arch so the
      #     app ships it inside the signed .app (end users never fetch it). ---
      - name: Stage llama-server binary
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pinned llama.cpp release for reproducible builds (the script also
          # pins this default). Bump deliberately to update.
          LLAMA_CPP_VERSION: "b9777"
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            # Windows runners are x64; the fetch script auto-detects the OS and
            # pulls the win-cpu-x64 build.
            ARCH=x64
          else
            case "${{ matrix.args }}" in
              *aarch64*) ARCH=arm64 ;;
              *x86_64*)  ARCH=x64 ;;
              *) echo "Unknown target; skipping llama-server stage"; exit 0 ;;
            esac
          fi
          bash scripts/fetch_llama_server.sh "$ARCH"

      # --- Frontend toolchain ---
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      # --- Rust toolchain (with macOS cross targets) ---
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          # Pinned by commit SHA, so the channel can't be inferred from the ref —
          # name it explicitly.
          toolchain: stable
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      # --- Build, sign the updater artifacts, and publish the release ---
      - uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Generated locally with `npm run tauri signer generate`. Store the
          # private key and its password as repository secrets (never commit them).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: frontend
          tagName: ${{ github.ref_name }}
          releaseName: "AI Private Workspace ${{ github.ref_name }}"
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          # Generates latest.json (the update manifest) alongside the installers.
          includeUpdaterJson: true
          args: ${{ matrix.args }}

  # --- After all installers are uploaded, prepend a tidy "Downloads" section to
  #     the release notes, grouped by platform (macOS Apple Silicon / Intel,
  #     Windows). Built from the assets that were actually uploaded, so the links
  #     are always correct regardless of the exact file names. ---
  download-links:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - name: Add a grouped Downloads section to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          ASSETS_JSON="$(gh release view "$TAG" --repo "$REPO" --json assets)"
          export ASSETS_JSON
          DOWNLOADS="$(python3 scripts/release_download_links.py "$REPO" "$TAG")"
          if [ -z "$DOWNLOADS" ]; then
            echo "No installer assets found; leaving the release notes unchanged."
            exit 0
          fi
          BODY="$(gh release view "$TAG" --repo "$REPO" --json body --jq .body)"
          printf '%s\n\n%s\n' "$DOWNLOADS" "$BODY" \
            | gh release edit "$TAG" --repo "$REPO" --notes-file -

      - name: Attach SHA256 checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          # Read each installer asset's sha256 digest straight from the API (no
          # re-download) and publish a standard SHA256SUMS.txt for verification.
          gh api "repos/$REPO/releases/tags/$TAG" \
            --jq '.assets[]
                  | select(.digest != null and (.name | test("\\.(dmg|exe)$")))
                  | "\(.digest | sub("^sha256:"; ""))  \(.name)"' \
            > SHA256SUMS.txt || true
          if [ -s SHA256SUMS.txt ]; then
            cat SHA256SUMS.txt
            gh release upload "$TAG" SHA256SUMS.txt --repo "$REPO" --clobber
          else
            echo "No installer digests available yet; skipping checksums."
          fi

  # --- Software Bill of Materials: scan the repo (Python requirements, npm
  #     package-lock, Cargo.lock) and attach an SPDX SBOM to the release so users
  #     can see exactly which dependencies ship. ---
  sbom:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
          upload-release-assets: false
      - name: Attach SBOM to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: gh release upload "${{ github.ref_name }}" sbom.spdx.json --repo "${{ github.repository }}" --clobber

  # --- Run the backend test suite and publish a concise report of what actually
  #     ran (summary counts + the list of suites) as a release asset. Separate
  #     from the build jobs, so it never blocks shipping the installers. ---
  test-report:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - name: Run backend tests and build the report
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.lock
          # Record reality whether tests pass or fail (don't abort the report).
          set +e
          ( cd backend && pytest -q -p no:cacheprovider ) | tee /tmp/pytest.out
          set -e
          SUMMARY="$(grep -E '[0-9]+ (passed|failed|error|skipped|xfailed)' /tmp/pytest.out | tail -1)"
          {
            echo "# Automated tests — ${{ github.ref_name }}"
            echo
            echo "Backend suite (\`pytest\`), run in CI on commit \`${GITHUB_SHA:0:7}\`:"
            echo
            echo '```'
            echo "${SUMMARY:-(see the CI logs)}"
            echo '```'
            echo
            echo "## Suites executed"
            echo
            for f in backend/tests/test_*.py; do echo "- \`${f#backend/tests/}\`"; done
            echo
            echo "Frontend verification (\`tsc\` typecheck + \`vite build\`) runs in the CI workflow on every commit."
          } > TEST-REPORT.md
      - name: Attach the test report to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: gh release upload "${{ github.ref_name }}" TEST-REPORT.md --repo "${{ github.repository }}" --clobber
