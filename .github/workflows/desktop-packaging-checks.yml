name: Desktop packaging checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate shell scripts
        run: |
          bash -n scripts/audit_release_candidate.sh
          bash -n scripts/prepare_source_release_archive.sh
          bash -n scripts/package_macos_app_foundation.sh
          bash -n scripts/prepare_tauri_shell_scaffold.sh
          bash -n scripts/prepare_windows_packaging_foundation.sh
      - name: Run release audit
        run: ./scripts/audit_release_candidate.sh
